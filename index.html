<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      font-size: 14px; 
      padding: 20px;
      background: var(--color-background-primary, #ffffff);
      color: var(--color-text-primary, #111111);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .stat-bar { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 14px; 
      flex-wrap: wrap; 
    }

    .stat { 
      background: #f4f4f5; 
      border-radius: 6px; 
      padding: 8px 14px; 
      font-size: 12px; 
      color: #666666; 
    }

    .stat strong { 
      font-size: 16px; 
      font-weight: 600; 
      color: #111111; 
      display: block; 
    }

    .controls { 
      display: flex; 
      gap: 15px; 
      margin-bottom: 20px; 
      flex-wrap: wrap; 
      align-items: center; 
      background: #fafafa;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #e4e4e7;
    }

    .controls label { 
      font-size: 12px; 
      font-weight: 500;
      color: #555555; 
      margin-right: 5px;
    }

    .controls select { 
      font-size: 13px; 
      border: 1px solid #e4e4e7; 
      border-radius: 4px; 
      background: #ffffff; 
      color: #111111; 
      padding: 6px 10px; 
      outline: none;
    }

    .tbl-wrap { 
      overflow-x: auto; 
      border: 1px solid #e4e4e7;
      border-radius: 8px;
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 13px; 
      text-align: left;
    }

    thead tr { 
      background: #f4f4f5; 
    }

    th { 
      padding: 12px 10px; 
      font-weight: 600; 
      font-size: 12px; 
      color: #444444; 
      border-bottom: 1px solid #e4e4e7; 
      white-space: nowrap; 
    }

    td { 
      padding: 12px 10px; 
      border-bottom: 1px solid #e4e4e7; 
      vertical-align: top; 
      line-height: 1.5; 
    }

    tr:last-child td { 
      border-bottom: none; 
    }

    tr:hover td { 
      background: #fafafa; 
    }

    .college-name { 
      font-weight: 600; 
      font-size: 13.5px; 
      color: #111111; 
      margin-bottom: 4px;
    }

    .district-badge { 
      display: inline-block; 
      font-size: 11px; 
      font-weight: 500;
      padding: 2px 8px; 
      border-radius: 12px; 
    }

    .pkd { background: #e0f2fe; color: #0369a1; }
    .mpm { background: #dcfce7; color: #15803d; }
    .tsr { background: #fef3c7; color: #b45309; }

    .type-g { background: #fee2e2; color: #b91c1c; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 12px; }
    .type-a { background: #e0e7ff; color: #4338ca; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 12px; }

    .course-tag { 
      display: inline-block; 
      font-size: 11px; 
      padding: 2px 6px; 
      border-radius: 4px; 
      margin: 2px 4px 2px 0; 
      background: #f4f4f5; 
      border: 1px solid #e4e4e7; 
      color: #3f3f46;

    .excellent { color: #16a34a; font-weight: 600; }
    .intermediate { color: #d97706; font-weight: 600; }
    .average { color: #dc2626; font-weight: 600; }

    .dist-num { font-weight: 600; color: #111111; }
    .remark { font-size: 12px; color: #4f4f4f; max-width: 200px; }
    .fee-box { font-size: 12px; color: #3f3f46; line-height: 1.4; }

// Filter data list to strictly handle institutions offering at least one target program
const validColleges = colleges.filter(c => c.courses.length > 0);
let filteredData = [...validColleges];

function buildRows(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let displayRank = 1;

  if(data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding: 30px; color: #888;">No colleges match the selected filter criteria.</td></tr>`;
    return;
  }

  data.forEach(c => {
    let distClass = 'pkd';
    if (c.district === 'Malappuram') distClass = 'mpm';
    if (c.district === 'Thrissur') distClass = 'tsr';

    const ratingClass = c.rating === 'Excellent' ? 'excellent' : (c.rating === 'Intermediate' ? 'intermediate' : 'average');
    const courseTags = c.courses.map(cr => `<span class="course-tag">${cr}</span>`).join('');
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align: center; font-weight: 600; color: #666;">${displayRank++}</td>
      <td>
        <div class="college-name">${c.name}</div>
        <span class="district-badge ${distClass}">${c.district}</span>
      </td>
      <td>${courseTags}</td>
      <td><span class="${c.type === 'Government' ? 'type-g' : 'type-a'}">${c.type}</span></td>
      <td style="white-space: nowrap; font-size: 12px;">${c.intake.replace(' | ', '<br>')}</td>
      <td>
        <span class="${ratingClass}">${c.rating}</span>
        <div style="font-size: 11px; color: #666; margin-top: 2px; line-height: 1.3;">${c.ratingNote}</div>
      </td>
      <td class="dist-num">~${c.dist} km</td>
      <td class="fee-box">${c.fee.replace(/\. /g, '.<br>')}</td>
      <td class="remark">${c.remarks}</td>
    `;
    tbody.appendChild(tr);
  });
}

function applyFilters() {
  const dist = document.getElementById('distFilter').value;
  const course = document.getElementById('courseFilter').value;
  const type = document.getElementById('typeFilter').value;
  const rating = document.getElementById('ratingFilter').value;

  filteredData = validColleges.filter(c => {
    if (dist !== 'all' && c.district !== dist) return false;
    if (course !== 'all' && !c.courses.includes(course)) return false;
    if (type !== 'all' && c.type !== type) return false;
    if (rating !== 'all' && c.rating !== rating) return false;
    return true;
  });

  // Calculate live configurations dynamically
  document.getElementById('totalCount').textContent = filteredData.length;
  document.getElementById('pkdCount').textContent = filteredData.filter(c => c.district === 'Palakkad').length;
  document.getElementById('mpmCount').textContent = filteredData.filter(c => c.district === 'Malappuram').length;
  document.getElementById('govtCount').textContent = filteredData.filter(c => c.type === 'Government').length;
  document.getElementById('aidedCount').textContent = filteredData.filter(c => c.type === 'Aided').length;

  buildRows(filteredData);
}

// Initial structural bootstrap
